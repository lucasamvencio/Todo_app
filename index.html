<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✅ To-Do COMPE</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --border-color: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      min-height: 100vh;
      background-color: var(--bg-surface);
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      background: var(--bg-surface);
      z-index: 10;
    }

    .app-header h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary);
    }

    .btn-add-tab {
      background: #f1f5f9;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-main);
      cursor: pointer;
    }

    .tabs-navigation {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      padding: 12px 16px;
      gap: 8px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
    }

    .tabs-navigation::-webkit-scrollbar {
      display: none;
    }

    .tab-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-button.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .tab-completed.active {
      background: var(--accent-success);
      border-color: var(--accent-success);
    }

    .delete-tab-icon {
      margin-left: 6px;
      font-size: 1.1rem;
      opacity: 0.6;
    }

    .app-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .tasks-section {
      flex: 1;
    }

    .btn-trigger-task-modal {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border-color);
      color: var(--text-muted);
      padding: 14px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s ease;
    }

    .btn-trigger-task-modal:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #f5f3ff;
    }

    .task-group {
      margin-bottom: 20px;
    }

    .group-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      padding: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      gap: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .task-title {
      font-size: 1rem;
      font-weight: 500;
      word-break: break-word;
    }

    .task-deadline {
      font-size: 0.75rem;
      color: var(--accent-danger);
      font-weight: 600;
    }

    .task-meta-info {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .checkbox-container {
      display: block;
      position: relative;
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .checkbox-container input {
      position: absolute;
      opacity: 0; width: 0; height: 0;
    }

    .checkmark {
      position: absolute;
      top: 0; left: 0; height: 24px; width: 24px;
      background-color: #fff;
      border: 2px solid var(--border-color);
      border-radius: 50%;
    }

    .checkbox-container input:checked ~ .checkmark {
      background-color: var(--accent-success);
      border-color: var(--accent-success);
    }

    .checkmark:after {
      content: ""; position: absolute; display: none;
    }

    .checkbox-container input:checked ~ .checkmark:after {
      display: block;
    }

    .checkbox-container .checkmark:after {
      left: 8px; top: 4px; width: 5px; height: 10px;
      border: solid white; border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .btn-delete-task {
      background: none; border: none; font-size: 1.1rem; cursor: pointer; opacity: 0.4;
    }
    .btn-delete-task:hover { opacity: 1; }

    .empty-state {
      text-align: center; color: var(--text-muted); padding: 40px 20px;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 100;
    }

    .modal-content {
      background: var(--bg-surface);
      width: 100%;
      max-width: 440px;
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .modal-content h3 {
      margin-bottom: 16px;
      color: var(--text-main);
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .modal-form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-form-row input {
      margin-bottom: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .modal-actions button {
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 0.95rem;
    }

    .btn-cancel { background: #e2e8f0; color: var(--text-main); }
    .btn-confirm { background: var(--primary); color: white; }

    /* --- COMPUTADOR EXPANDIDO (TELA GRANDE) --- */
    @media (min-width: 768px) {
      body {
        padding: 40px;
        background-color: #e2e8f0;
      }

      .app-container {
        width: 100%;
        max-width: 1400px;
        min-height: 85vh;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        display: grid;
        grid-template-columns: 280px 1fr;
        grid-template-rows: auto 1fr;
        grid-template-areas:
          "header header"
          "nav main";
        overflow: hidden;
      }

      .app-header { 
        grid-area: header; 
        padding: 24px 40px;
      }
      
      .app-header h1 {
        font-size: 1.6rem;
      }

      .tabs-navigation {
        grid-area: nav;
        flex-direction: column;
        overflow-x: visible;
        white-space: normal;
        background: var(--bg-primary);
        border-bottom: none;
        border-right: 1px solid var(--border-color);
        padding: 32px 20px;
        gap: 12px;
      }

      .tab-button {
        display: flex;
        justify-content: space-between;
        width: 100%;
        border-radius: 10px;
        padding: 14px 18px;
        font-size: 0.95rem;
        border: 1px solid transparent;
      }
      
      .tab-button:hover { background: #e2e8f0; }
      .tab-button.active:hover { background: var(--primary); }

      .app-content {
        grid-area: main;
        padding: 48px;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [tabs, setTabs] = useState(() => {
        const savedTabs = localStorage.getItem('todo_tabs');
        return savedTabs ? JSON.parse(savedTabs) : [{ id: 'geral', name: 'Geral' }];
      });

      const [tasks, setTasks] = useState(() => {
        const savedTasks = localStorage.getItem('todo_tasks');
        return savedTasks ? JSON.parse(savedTasks) : [];
      });

      const [activeTab, setActiveTab] = useState('geral');
      const [newTaskTitle, setNewTaskTitle] = useState('');
      const [newTaskDeadline, setNewTaskDeadline] = useState('');
      const [newTaskGroup, setNewTaskGroup] = useState('');
      const [newTabName, setNewTabName] = useState('');
      
      const [showAddTabModal, setShowAddTabModal] = useState(false);
      const [showAddTaskModal, setShowAddTaskModal] = useState(false);

      useEffect(() => {
        localStorage.setItem('todo_tabs', JSON.stringify(tabs));
      }, [tabs]);

      useEffect(() => {
        localStorage.setItem('todo_tasks', JSON.stringify(tasks));
      }, [tasks]);

      const handleCreateTab = (e) => {
        e.preventDefault();
        if (!newTabName.trim()) return;
        const newTab = { id: Date.now().toString(), name: newTabName.trim() };
        setTabs([...tabs, newTab]);
        setActiveTab(newTab.id);
        setNewTabName('');
        setShowAddTabModal(false);
      };

      const handleDeleteTab = (tabId, e) => {
        e.stopPropagation();
        if (window.confirm('Deletar esta aba apagará todas as tarefas dela. Continuar?')) {
          setTabs(tabs.filter(tab => tab.id !== tabId));
          setTasks(tasks.filter(task => task.tabId !== tabId));
          setActiveTab('geral');
        }
      };

      const handleAddTask = (e) => {
        e.preventDefault();
        if (!newTaskTitle.trim()) return;
        
        const newTask = {
          id: Date.now().toString(),
          tabId: activeTab,
          title: newTaskTitle.trim(),
          deadline: newTaskDeadline,
          group: newTaskGroup.trim() || 'Sem Grupo',
          completed: false,
        };
        
        setTasks([...tasks, newTask]);
        setNewTaskTitle('');
        setNewTaskDeadline('');
        setNewTaskGroup('');
        setShowAddTaskModal(false);
      };

      const toggleTaskCompletion = (taskId) => {
        setTasks(tasks.map(task => 
          task.id === taskId ? { ...task, completed: !task.completed } : task
        ));
      };

      const handleDeleteTask = (taskId) => {
        setTasks(tasks.filter(task => task.id !== taskId));
      };

      const activeTasks = tasks.filter(task => !task.completed && task.tabId === activeTab);
      const completedTasks = tasks.filter(task => task.completed);

      const groupedTasks = activeTasks.reduce((groups, task) => {
        const groupName = task.group;
        if (!groups[groupName]) groups[groupName] = [];
        groups[groupName].push(task);
        return groups;
      }, {});

      const formatDeadline = (dateTimeString) => {
        if (!dateTimeString) return null;
        const date = new Date(dateTimeString);
        return date.toLocaleString('pt-BR', {
          day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        });
      };

      return (
        <div className="app-container">
          <header className="app-header">
            <h1>✅ To-Do COMPE</h1>
            <button className="btn-add-tab" onClick={() => setShowAddTabModal(true)}>+ Nova Aba</button>
          </header>

          <nav className="tabs-navigation">
            {tabs.map(tab => (
              <button
                key={tab.id}
                className={`tab-button ${activeTab === tab.id ? 'active' : ''}`}
                onClick={() => setActiveTab(tab.id)}
              >
                <span>📁 {tab.name}</span>
                {tab.id !== 'geral' && (
                  <span className="delete-tab-icon" onClick={(e) => handleDeleteTab(tab.id, e)}>×</span>
                )}
              </button>
            ))}
            <button
              className={`tab-button tab-completed ${activeTab === 'concluidos' ? 'active' : ''}`}
              onClick={() => setActiveTab('concluidos')}
            >
              <span>✅ Concluídos</span>
              <span className="badge">({completedTasks.length})</span>
            </button>
          </nav>

          <main className="app-content">
            {activeTab !== 'concluidos' ? (
              <div className="tasks-section">
                {Object.keys(groupedTasks).length === 0 ? (
                  <p className="empty-state">Nenhuma tarefa pendente nesta aba. 🙌</p>
                ) : (
                  Object.keys(groupedTasks).map(groupName => (
                    <div key={groupName} className="task-group">
                      <h4 className="group-title">📂 {groupName}</h4>
                      <div className="tasks-list">
                        {groupedTasks[groupName].map(task => (
                          <div key={task.id} className="task-item">
                            <label className="checkbox-container">
                              <input type="checkbox" checked={task.completed} onChange={() => toggleTaskCompletion(task.id)} />
                              <span className="checkmark"></span>
                            </label>
                            <div className="task-details">
                              <span className="task-title">{task.title}</span>
                              {task.deadline && <span className="task-deadline">📅 {formatDeadline(task.deadline)}</span>}
                            </div>
                            <button className="btn-delete-task" onClick={() => handleDeleteTask(task.id)}>🗑️</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))
                )}

                <button className="btn-trigger-task-modal" onClick={() => setShowAddTaskModal(true)}>
                  ➕ Adicionar Tarefa
                </button>
              </div>
            ) : (
              <div className="tasks-section">
                <h2>Tarefas Concluídas</h2>
                {completedTasks.length === 0 ? (
                  <p className="empty-state">Nenhuma tarefa concluída ainda. 🚀</p>
                ) : (
                  <div className="tasks-list">
                    {completedTasks.map(task => (
                      <div key={task.id} className="task-item completed">
                        <label className="checkbox-container">
                          <input type="checkbox" checked={task.completed} onChange={() => toggleTaskCompletion(task.id)} />
                          <span className="checkmark"></span>
                        </label>
                        <div className="task-details">
                          <span className="task-title">{task.title}</span>
                          <span className="task-meta-info">Aba original: {tabs.find(t => t.id === task.tabId)?.name || 'Deletada'} | Grupo: {task.group}</span>
                        </div>
                        <button className="btn-delete-task" onClick={() => handleDeleteTask(task.id)}>🗑️</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>

          {showAddTaskModal && (
            <div className="modal-overlay" onClick={() => setShowAddTaskModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <h3>Nova Tarefa</h3>
                <form onSubmit={handleAddTask}>
                  <input
                    type="text"
                    placeholder="O que precisa ser feito?"
                    value={newTaskTitle}
                    onChange={(e) => setNewTaskTitle(e.target.value)}
                    required
                    autoFocus
                  />
                  <div className="modal-form-row">
                    <input type="datetime-local" value={newTaskDeadline} onChange={(e) => setNewTaskDeadline(e.target.value)} />
                    <input type="text" placeholder="Grupo (ex: Trabalho)" value={newTaskGroup} onChange={(e) => setNewTaskGroup(e.target.value)} />
                  </div>
                  <div className="modal-actions">
                    <button type="button" className="btn-cancel" onClick={() => setShowAddTaskModal(false)}>Cancelar</button>
                    <button type="submit" className="btn-confirm">Salvar Tarefa</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {showAddTabModal && (
            <div className="modal-overlay" onClick={() => setShowAddTabModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <h3>Criar Nova Aba</h3>
                <form onSubmit={handleCreateTab}>
                  <input type="text" placeholder="Nome da Aba" value={newTabName} onChange={(e) => setNewTabName(e.target.value)} autoFocus required />
                  <div className="modal-actions">
                    <button type="button" className="btn-cancel" onClick={() => setShowAddTabModal(false)}>Cancelar</button>
                    <button type="submit" className="btn-confirm">Criar</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
